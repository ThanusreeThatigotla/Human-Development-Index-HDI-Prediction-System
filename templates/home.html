<!DOCTYPE html>
<html>
<head>
    <title>Human Development Index Predictor</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background:
            linear-gradient(
                rgba(0,0,0,0.65),
                rgba(0,0,0,0.75)
            ),
            url('https://images.unsplash.com/photo-1460925895917-afdab827c52f');

            background-size:cover;
            background-position:center;
        }

        .container{
            width:800px;
            padding:50px;
            text-align:center;

            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(15px);

            border-radius:25px;

            box-shadow:
            0 8px 32px rgba(0,0,0,0.4);
        }

        h1{
            color:#ffd700;
            font-size:42px;
            margin-bottom:25px;
        }

        p{
            color:white;
            font-size:20px;
            line-height:1.8;
        }

        .btn{
            display:inline-block;

            margin-top:35px;

            padding:15px 45px;

            border-radius:30px;

            background:
            linear-gradient(
                45deg,
                #11998e,
                #38ef7d
            );

            color:white;
            text-decoration:none;
            font-size:20px;
            font-weight:bold;

            transition:0.3s;
        }

        .btn:hover{
            transform:translateY(-4px);

            box-shadow:
            0 5px 20px
            rgba(56,239,125,0.5);
        }

    </style>
</head>

<body>

<div class="container">

    <h1>
        Human Development Index Predictor
    </h1>

    <p>
        The Human Development Index (HDI) is a statistical
        measure used to evaluate the overall development
        of countries based on life expectancy,
        education, and income indicators.
    </p>

    <a href="/Prediction" class="btn">
        Start Prediction
    </a>

</div>

</body>
</html>
